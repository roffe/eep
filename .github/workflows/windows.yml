name: Build Windows
on:
  push:
    branches:
      - develop
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      # eep and cim are checked out side-by-side so the
      # `replace github.com/roffe/cim => ../cim` in go.mod resolves.
      - name: Checkout eep
        uses: actions/checkout@v6.0.2
        with:
          path: eep

      - name: Checkout cim
        uses: actions/checkout@v6.0.2
        with:
          repository: roffe/cim
          path: cim
          # cim is a private repo in another org; the default GITHUB_TOKEN
          # can't read it. Create a PAT with read access and add it as the
          # CIM_TOKEN repo secret.
          token: ${{ secrets.CIM_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.25.0'
          cache: false

      - name: Install llvm-mingw (x64 + x86 cross compilers)
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20250528/llvm-mingw-20250528-ucrt-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\llvm-mingw.zip"
          Expand-Archive "$env:RUNNER_TEMP\llvm-mingw.zip" -DestinationPath $env:RUNNER_TEMP
          "$env:RUNNER_TEMP\llvm-mingw-20250528-ucrt-x86_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install fyne
        run: |
          go install fyne.io/tools/cmd/fyne@latest
          "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build
        working-directory: eep
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "x86_64-w64-mingw32-gcc"; $env:GOARCH = "amd64"
          fyne package --target windows --release --executable Saab_CIM_Tool_x64.exe --name Saab_CIM_Tool_x64
          $env:CC = "i686-w64-mingw32-gcc"; $env:GOARCH = "386"
          fyne package --target windows --release --executable Saab_CIM_Tool_x86.exe --name Saab_CIM_Tool_x86
          7z a Saab_CIM_Tool_x64.zip Saab_CIM_Tool_x64.exe
          7z a Saab_CIM_Tool_x86.zip Saab_CIM_Tool_x86.exe

      - name: Delete previous nightly release
        if: github.ref == 'refs/heads/develop'
        working-directory: eep
        run: |
          gh release view nightly 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete nightly --yes --cleanup-tag
          } else {
            Write-Host "No existing nightly release to delete."
            $global:LASTEXITCODE = 0
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release
        if: github.ref == 'refs/heads/develop'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly Build
          body: Automated build from `${{ github.ref_name }}` at ${{ github.sha }}.
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            eep/Saab_CIM_Tool_x64.zip
            eep/Saab_CIM_Tool_x86.zip

      - name: Publish tagged release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: "true"
          files: |
            eep/Saab_CIM_Tool_x64.zip
            eep/Saab_CIM_Tool_x86.zip
